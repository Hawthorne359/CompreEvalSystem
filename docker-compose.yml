# ============================================================
# CompreEvalSystem — Docker Compose
#
# 本地开发（在本地电脑构建）：
#   docker compose build
#   docker compose up -d
#
# 生产服务器（拉取已推送到 Docker Hub 的镜像）：
#   在 .env 中设置 IMAGE_NAME=你的DockerHub用户名/compre-eval-backend:latest
#   docker compose up -d
#
# 服务说明：
#   mysql   — MySQL 8.0 数据库（内部端口 3306，不对外暴露）
#   backend — Django + Uvicorn ASGI 应用（内部端口 8000）
#   nginx   — 反向代理 + 静态/媒体文件服务（对外端口 80）
# ============================================================

services:

  # ── MySQL 数据库 ────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_HOST: "%"
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Django 后端 ─────────────────────────────────────────────
  backend:
    image: ${IMAGE_NAME:-compre-eval-backend:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: mysql
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
      - ./cache:/app/cache
      - frontend_dist:/app/frontend/dist
      - staticfiles:/app/staticfiles
    depends_on:
      mysql:
        condition: service_healthy

  # ── Nginx 反向代理 ──────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./media:/app/media:ro
      - frontend_dist:/app/frontend/dist:ro
      - staticfiles:/app/staticfiles:ro
    depends_on:
      - backend

volumes:
  mysql_data:
    driver: local
  frontend_dist:
    driver: local
  staticfiles:
    driver: local
