server {
    listen 80;
    server_name _;

    # 客户端上传文件大小限制（与 Django 端保持一致，按需调整）
    client_max_body_size 50M;

    # 前端 Vue 静态产物（SPA 路由，所有非 API/media/static 请求回退到 index.html）
    location / {
        root /app/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Django 静态文件（collectstatic 产物，容器内路径）
    location /static/ {
        alias /app/staticfiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 媒体文件（用户上传，通过 volume 挂载到宿主机）
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Django API 接口 → 反向代理到 backend 容器
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 60;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE 实时推送（长连接，禁用缓冲）
    location /api/v1/realtime/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
    }
}
